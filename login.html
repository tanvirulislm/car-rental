<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register | Your Car Rental</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
    </head>
    <body class="bg-gray-50">
        <div class="min-h-screen flex items-center justify-center p-4">
            <div class="w-full max-w-md">
                <!-- Logo -->
                <div class="text-center mb-8">
                    <div class="flex-shrink-0 flex items-center">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor"
                            class="w-6 h-6 text-blue-600 mr-2"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12"
                            />
                        </svg>
                        <span class="text-xl font-semibold text-gray-800"
                            >ClassicDrive</span
                        >
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800 mt-4">
                        Create your account
                    </h1>
                    <p class="text-gray-600">
                        Get started with your rental journey
                    </p>
                </div>

                <!-- Registration Card -->
                <div class="bg-white rounded-xl shadow-md p-8">
                    <form>
                        <!-- Name -->
                        <div class="mb-5">
                            <label
                                for="name"
                                class="block text-sm font-medium text-gray-700 mb-1"
                                >Your name</label
                            >
                            <div class="relative">
                                <div
                                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                                >
                                    <i class="fas fa-user text-gray-400"></i>
                                </div>
                                <input
                                    type="name"
                                    id="name"
                                    class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                    placeholder="John Doe"
                                    required
                                />
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-5">
                            <label
                                for="email"
                                class="block text-sm font-medium text-gray-700 mb-1"
                                >Email address</label
                            >
                            <div class="relative">
                                <div
                                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                                >
                                    <i
                                        class="fas fa-envelope text-gray-400"
                                    ></i>
                                </div>
                                <input
                                    type="email"
                                    id="email"
                                    class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                    placeholder="you@example.com"
                                    required
                                />
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-5">
                            <label
                                for="password"
                                class="block text-sm font-medium text-gray-700 mb-1"
                                >Password</label
                            >
                            <div class="relative">
                                <div
                                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                                >
                                    <i class="fas fa-lock text-gray-400"></i>
                                </div>
                                <input
                                    type="password"
                                    id="password"
                                    class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                    placeholder="••••••••"
                                    required
                                />
                                <button
                                    type="button"
                                    class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-500"
                                >
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <p class="mt-1 text-xs text-gray-500">
                                Must be at least 8 characters
                            </p>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-6">
                            <label
                                for="confirm-password"
                                class="block text-sm font-medium text-gray-700 mb-1"
                                >Confirm password</label
                            >
                            <div class="relative">
                                <div
                                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                                >
                                    <i class="fas fa-lock text-gray-400"></i>
                                </div>
                                <input
                                    type="password"
                                    id="confirm-password"
                                    class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                    placeholder="••••••••"
                                    required
                                />
                            </div>
                        </div>

                        <!-- Terms Checkbox -->
                        <div class="flex items-center mb-6">
                            <input
                                id="terms"
                                name="terms"
                                type="checkbox"
                                class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded"
                                required
                            />
                            <label
                                for="terms"
                                class="ml-2 block text-sm text-gray-700"
                            >
                                I agree to the
                                <a
                                    href="#"
                                    class="text-blue-600 hover:underline"
                                    >Terms of Service</a
                                >
                                and
                                <a
                                    href="#"
                                    class="text-blue-600 hover:underline"
                                    >Privacy Policy</a
                                >
                            </label>
                        </div>

                        <!-- Submit Button -->
                        <button
                            type="submit"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 px-4 rounded-lg font-medium transition-colors"
                        >
                            Create account
                        </button>
                    </form>
                </div>

                <!-- Login Link -->
                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-600">
                        Already have an account?
                        <a
                            href="#"
                            class="font-medium text-blue-600 hover:underline"
                            >Sign in</a
                        >
                    </p>
                </div>
            </div>
        </div>
    </body>
</html>
